<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO List</title>

    <link rel="icon" href="images/logo.jpg" type="image/x-icon" />

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

    <script
      src="https://kit.fontawesome.com/1fd45912ed.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main>
      <div class="container">
        <h1>Make Your TODO List!</h1>
        <div class="pTag">
          <p>Add your items here 🖊️</p>
        </div>

        <div class="input">
          <input type="text" placeholder="your item" />
          <button>submit</button>
        </div>

        <!-- Your Tasks -->
        <div class="items">
          <h4>Your Tasks</h4>
          <ul>
            <li>
              <p>React</p>
              <div>
                <button>
                  <i class="fa-solid fa-check" style="color: rgb(0, 209, 70)"></i>
                </button>
                <button>
                  <i
                    class="fa-regular fa-trash-can"
                    style="color: rgb(211, 0, 0)"
                  ></i>
                </button>
              </div>
            </li>

            <li>
              <del>Gym</del>
              <div>
                <button>
                  <i class="fa-solid fa-check" style="color:rgb(0, 209, 70)"></i>
                </button>
                <button>
                  <i
                    class="fa-regular fa-trash-can"
                    style="color: rgb(211, 0, 0)"
                  ></i>
                </button>
              </div>
            </li>

            <li>
              <p>HTML</p>
              <div>
                <button>
                  <i class="fa-solid fa-check" style="color: rgb(0, 209, 70)"></i>
                </button>
                <button>
                  <i
                    class="fa-regular fa-trash-can"
                    style="color: rgb(211, 0, 0)"
                  ></i>
                </button>
              </div>
            </li>
          </ul>
        </div>

        <!-- Clear All Button -->
        <button class="clearAll">Clear All</button>
      </div>
    </main>
    <footer>
      <p class="name">Made by DevMohammadAhmedHassan</p>
    </footer>
  </body>
</html>
